<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scm.Net 版本更新历史</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 60px 0;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 2px solid #e0e0e0;
            border-top-color: #409eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background-color: #fef0f0;
            color: #f56c6c;
            padding: 15px 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid #fde2e2;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 8px;
            bottom: 0;
            width: 2px;
            background-color: #e4e7ed;
        }

        .version-item {
            position: relative;
            margin-bottom: 30px;
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .version-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .version-item::before {
            content: '';
            position: absolute;
            left: -28px;
            top: 32px;
            width: 12px;
            height: 12px;
            background-color: #409eff;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px #409eff;
        }

        .version-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .version-number {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .version-badge {
            display: inline-block;
            background-color: #ecf5ff;
            color: #409eff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 8px;
        }

        .version-date {
            font-size: 13px;
            color: #909399;
        }

        .version-content {
            color: #606266;
            font-size: 14px;
        }

        .version-content ul {
            list-style: none;
            padding-left: 0;
        }

        .version-content li {
            position: relative;
            padding-left: 16px;
            margin-bottom: 6px;
        }

        .version-content li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10px;
            width: 6px;
            height: 6px;
            background-color: #c0c4cc;
            border-radius: 50%;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 22px;
            }

            .version-item {
                padding: 16px;
            }

            .version-item::before {
                left: -24px;
            }

            .timeline {
                padding-left: 24px;
            }

            .timeline::before {
                left: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>版本更新历史</h1>
            <p>Scm.Net 应用版本变更记录</p>
        </div>
        <div id="app">
            <div class="loading">正在加载版本信息</div>
        </div>
    </div>

    <script>
        (function() {
            const API_URL = 'https://api.c-scm.net/api/scmsysapp/ver?code=scm.net&client=20';
            const container = document.getElementById('app');

            function formatDate(dateStr) {
                if (!dateStr) return '';
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                return date.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            }

            function extractVersions(data) {
                if (!data) return [];
                if (Array.isArray(data)) return data;
                if (Array.isArray(data.data)) return data.data;
                if (Array.isArray(data.list)) return data.list;
                if (Array.isArray(data.rows)) return data.rows;
                if (Array.isArray(data.versions)) return data.versions;
                if (Array.isArray(data.records)) return data.records;
                if (typeof data === 'object' && data.version) return [data];
                return [];
            }

            function renderContent(content) {
                if (!content) return '';
                if (Array.isArray(content)) {
                    return '<ul>' + content.map(item => `<li>${escapeHtml(String(item))}</li>`).join('') + '</ul>';
                }
                if (typeof content === 'string') {
                    const lines = content.split(/\n|\\n/).filter(line => line.trim());
                    if (lines.length > 1) {
                        return '<ul>' + lines.map(line => `<li>${escapeHtml(line.trim())}</li>`).join('') + '</ul>';
                    }
                    return '<p>' + escapeHtml(content) + '</p>';
                }
                return '<p>' + escapeHtml(String(content)) + '</p>';
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function renderVersions(versions) {
                if (versions.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            <div>暂无版本记录</div>
                        </div>
                    `;
                    return;
                }

                const sorted = [...versions].sort((a, b) => {
                    const dateA = a.releaseDate || a.publishDate || a.date || a.createTime || '';
                    const dateB = b.releaseDate || b.publishDate || b.date || b.createTime || '';
                    if (dateA && dateB) return new Date(dateB) - new Date(dateA);
                    
                    const verA = a.version || a.versionNo || a.ver || '';
                    const verB = b.version || b.versionNo || b.ver || '';
                    return String(verB).localeCompare(String(verA), undefined, { numeric: true });
                });

                const html = sorted.map((item, index) => {
                    const version = item.version || item.versionNo || item.ver || item.name || '未知版本';
                    const date = formatDate(item.releaseDate || item.publishDate || item.date || item.createTime);
                    const content = item.changeLog || item.content || item.changes || item.description || item.log || item.note || '';
                    const isLatest = index === 0;
                    
                    return `
                        <div class="version-item">
                            <div class="version-header">
                                <div>
                                    <span class="version-number">${escapeHtml(String(version))}</span>
                                    ${isLatest ? '<span class="version-badge">最新</span>' : ''}
                                </div>
                                ${date ? `<div class="version-date">${escapeHtml(date)}</div>` : ''}
                            </div>
                            <div class="version-content">
                                ${renderContent(content)}
                            </div>
                        </div>
                    `;
                }).join('');

                container.innerHTML = `<div class="timeline">${html}</div>`;
            }

            function showError(message) {
                container.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
            }

            fetch(API_URL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`请求失败: ${response.status} ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    const versions = extractVersions(data);
                    renderVersions(versions);
                })
                .catch(error => {
                    console.error('获取版本信息失败:', error);
                    showError('获取版本信息失败，请稍后重试。' + error.message);
                });
        })();
    </script>
</body>
</html>
